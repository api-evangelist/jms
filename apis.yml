aid: jms
name: JMS
description: >-
  Java Message Service (JMS), now known as Jakarta Messaging, is a Java API
  that allows applications to create, send, receive, and read messages. It
  defines a common enterprise messaging API for loosely coupled, reliable, and
  asynchronous communication between distributed application components.
  Current release is Jakarta Messaging 3.1 (Jakarta EE 10).
